services:
  postgres:
    image: postgres:15-alpine
    container_name: 4epices_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "4epices"
      POSTGRES_USER: "4epices"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - 4epices_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 4epices_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Configuration IA pour génération de contenu Pinterest (Groq)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "1337:1337"
    volumes:
      - ./backend:/opt/app
      - /opt/app/node_modules
      - ./backend/uploads:/opt/app/public/uploads
    depends_on:
      - postgres
    networks:
      - 4epices_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-https://api.4epices.fr}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://4epices.fr}
        NEXT_PUBLIC_ADMIN_SECRET: ${NEXT_PUBLIC_ADMIN_SECRET:-}
    container_name: 4epices_frontend
    restart: unless-stopped
    environment:
      # URL pour les requêtes serveur (SSR) - utilise le service Docker
      STRAPI_URL: http://backend:1337
      # URL publique pour le client (déjà dans NEXT_PUBLIC_STRAPI_URL)
      # Configuration IA (Groq recommandé - gratuit et performant)
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Fallback Ollama (optionnel)
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      # Fallback OpenAI (optionnel)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ollama
    networks:
      - 4epices_network

  ollama:
    image: ollama/ollama:latest
    container_name: 4epices_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - 4epices_network
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    # Optionnel : limiter les ressources si nécessaire
    # deploy:
    #   resources:
    #     limits:
    #       memory: 6G
    #     reservations:
    #       memory: 4G

  cron:
    image: curlimages/curl:latest
    container_name: 4epices_cron
    restart: unless-stopped
    command: >
      sh -c "
      while true; do
        sleep 300;
        echo \"[Cron Docker] Traitement de la queue Pinterest...\";
        curl -X POST http://backend:1337/api/pinterest/process-queue -H \"X-Cron-Source: docker\" || echo \"[Cron Docker] Erreur lors de l'appel\";
      done
      "
    depends_on:
      - backend
    networks:
      - 4epices_network

networks:
 4epices_network:
   driver: bridge

volumes:
  postgres_data:
  ollama_data:

